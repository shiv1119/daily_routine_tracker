{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-header text-center py-4" style="background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%);">
                    <div class="mb-3">
                        <i class="fas fa-tasks fa-3x text-white"></i>
                    </div>
                    <h3 class="text-white mb-0">Daily Routine Tracker</h3>
                    <p class="text-white-50 mb-0">Track your progress, level up your life</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" name="username" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                        </div>
                        <input type="hidden" name="next" value="{{ next }}">
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="mb-0">Don't have an account? 
                            <a href="{% url 'register' %}" class="text-primary fw-bold">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Features -->
            <div class="row mt-4 g-3">
                <div class="col text-center">
                    <small class="text-muted">
                        <i class="fas fa-chart-line me-1"></i> Track habits |
                        <i class="fas fa-trophy ms-2 me-1"></i> Earn ranks |
                        <i class="fas fa-chart-simple ms-2 me-1"></i> Visualize progress
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.min-vh-100 {
    min-height: 100vh;
}
.input-group-text {
    background: #f8f9fe;
    border-right: none;
}
.form-control:focus {
    border-color: #5e72e4;
    box-shadow: 0 0 0 2px rgba(94, 114, 228, 0.2);
}
</style>
{% endblock %}
